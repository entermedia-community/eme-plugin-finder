<button class="sidebar-section-btn"
  style="background-color: hsl(214, 84%, 97%);"
  data-bs-toggle="collapse"
  data-bs-target="#sbTeamBody"
  aria-expanded="false"
  aria-controls="sbTeamBody">
  <span class="d-flex align-items-center gap-2">
    <i class="bi bi-people-fill sect-icon" style="color:#1a6dda;"></i>[[Teams]]
  </span>
  <i class="bi bi-chevron-down sect-chevron"></i>
</button>

<div class="collapse py-2" id="sbTeamBody">

  #set( $teams = [0,0,0])
  
  #if($teams.size() > 0)
    #foreach($team in $teams)
      <a class="file-row ajax"
        href="$applink/views/modules/asset/editors/detail/index.html?id=0"
        data-targetdiv="chatMainContent"
        data-oemaxlevel="4"
        title="John Doe">
        <i class="bi bi-collection f-icon" style="color:#1a6dda;"></i>
        <span class="f-name">John Doe</span>
      </a>
    #end
  #else
    <p class="px-2 py-1" style="font-size:0.81rem; color:#9ca3af;">[[Nothing shared with you yet.]]</p>
  #end

</div>
